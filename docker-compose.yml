services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PostgreSQL 18  (primary datastore — Drizzle ORM)
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:18-alpine
    container_name: kpos-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-kpos_db}
      POSTGRES_USER:     ${POSTGRES_USER:-kpos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kpos_secret_change_me}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kpos} -d ${POSTGRES_DB:-kpos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: kpos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # RabbitMQ Message Queue (optional — only consumed when RABBITMQ_URL is set)
  # ═══════════════════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: kpos-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kpos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-kpos_secret_change_me}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # DB Migration (runs once on deploy, then exits)
  # Applies all pending Drizzle migrations before the API starts.
  # ═══════════════════════════════════════════════════════════════════════════
  migrate:
    build:
      context: ./APIS
      dockerfile: Dockerfile
      target: migrator
    container_name: kpos-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kpos}:${POSTGRES_PASSWORD:-kpos_secret_change_me}@postgres:5432/${POSTGRES_DB:-kpos_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kpos-network

  # ═══════════════════════════════════════════════════════════════════════════
  # KPOS API Backend
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ./APIS
      dockerfile: Dockerfile
      target: production
    container_name: kpos-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      NODE_ENV:                ${NODE_ENV:-production}
      PORT:                    5000
      DATABASE_URL:            postgresql://${POSTGRES_USER:-kpos}:${POSTGRES_PASSWORD:-kpos_secret_change_me}@postgres:5432/${POSTGRES_DB:-kpos_db}
      REDIS_URL:               redis://redis:6379
      RABBITMQ_URL:            amqp://${RABBITMQ_USER:-kpos}:${RABBITMQ_PASS:-kpos_secret_change_me}@rabbitmq:5672
      JWT_SECRET:              ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN:          ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME:   ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:      ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:   ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER:       ${CLOUDINARY_FOLDER:-kpos}
      CORS_ORIGIN:             ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ═══════════════════════════════════════════════════════════════════════════
  # KPOS Frontend  (adapter-node — runs as a Node.js server)
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./kpos
      dockerfile: Dockerfile
      target: production
      args:
        # Baked into the client bundle at build time
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: kpos-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
      HOST:           0.0.0.0
      PORT:           3000
    depends_on:
      - api
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy  (profile: production)
  # Start with: docker compose --profile production up -d
  # Without the profile, traffic goes directly to api:5000 / frontend:3000
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: kpos-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - kpos-network
    profiles:
      - production

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  kpos-network:
    driver: bridge
    name: kpos-network

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: kpos-postgres-data
  redis_data:
    name: kpos-redis-data
  rabbitmq_data:
    name: kpos-rabbitmq-data
