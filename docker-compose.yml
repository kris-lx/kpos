services:
  # ═══════════════════════════════════════════════════════════════════════════
  # PostgreSQL 18  (primary datastore — Drizzle ORM)
  # ═══════════════════════════════════════════════════════════════════════════
  postgres:
    image: postgres:18-alpine
    container_name: kpos-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-kpos_db}
      POSTGRES_USER:     ${POSTGRES_USER:-kpos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_INITDB_ARGS: --encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kpos} -d ${POSTGRES_DB:-kpos_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis Cache
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7.2-alpine
    container_name: kpos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }

  # ═══════════════════════════════════════════════════════════════════════════
  # RabbitMQ Message Queue (optional — only consumed when RABBITMQ_URL is set)
  # ═══════════════════════════════════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: kpos-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-kpos}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS must be set in .env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }

  # ═══════════════════════════════════════════════════════════════════════════
  # DB Migration (runs once on deploy, then exits)
  # Applies all pending Drizzle migrations before the API starts.
  # ═══════════════════════════════════════════════════════════════════════════
  migrate:
    build:
      context: ./APIS
      dockerfile: Dockerfile
      target: migrator
    container_name: kpos-migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kpos}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-kpos_db}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kpos-network
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ═══════════════════════════════════════════════════════════════════════════
  # KPOS API Backend
  # ═══════════════════════════════════════════════════════════════════════════
  api:
    build:
      context: ./APIS
      dockerfile: Dockerfile
      target: production
    container_name: kpos-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      NODE_ENV:                ${NODE_ENV:-production}
      PORT:                    5000
      # Least-privilege role (no SUPERUSER/BYPASSRLS) so RLS policies actually
      # apply to the running API. Migrations run separately as the superuser
      # `kpos` role (see the `migrate` service above) — never as this one.
      DATABASE_URL:            postgresql://kpos_app:${POSTGRES_APP_PASSWORD:?POSTGRES_APP_PASSWORD must be set in .env}@postgres:5432/${POSTGRES_DB:-kpos_db}
      REDIS_URL:               redis://redis:6379
      RABBITMQ_URL:            amqp://${RABBITMQ_USER:-kpos}:${RABBITMQ_PASS:?RABBITMQ_PASS must be set in .env}@rabbitmq:5672
      JWT_SECRET:              ${JWT_SECRET:?JWT_SECRET must be set in .env}
      JWT_EXPIRES_IN:          ${JWT_EXPIRES_IN:-20h}
      JWT_REFRESH_EXPIRES_IN:  ${JWT_REFRESH_EXPIRES_IN:-20h}
      SESSION_ABSOLUTE_HOURS:  ${SESSION_ABSOLUTE_HOURS:-20}
      CONFIG_ENCRYPTION_KEY:   ${CONFIG_ENCRYPTION_KEY:?CONFIG_ENCRYPTION_KEY must be set in .env}
      AUDIT_HMAC_SECRET:       ${AUDIT_HMAC_SECRET:?AUDIT_HMAC_SECRET must be set in .env}
      CLOUDINARY_CLOUD_NAME:   ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY:      ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET:   ${CLOUDINARY_API_SECRET:-}
      CLOUDINARY_FOLDER:       ${CLOUDINARY_FOLDER:-kpos}
      CORS_ORIGIN:             ${CORS_ORIGIN:-http://localhost:3000,http://localhost}
      API_BASE_URL:            ${API_BASE_URL:-}
      APP_URL:                 ${APP_URL:-}
      # instrumentation.ts is vendor-agnostic by design (see its header
      # comment) — pointing this at the otel-collector is the only wiring
      # needed to feed the monitoring stack (`--profile monitoring`); no
      # app code change. Left unset (falls back to console export) when the
      # monitoring stack isn't running, so `docker compose up` without the
      # profile still works standalone.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1g }

  # ═══════════════════════════════════════════════════════════════════════════
  # KPOS Frontend  (adapter-node — runs as a Node.js server)
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./kpos
      dockerfile: Dockerfile
      target: production
      args:
        # Baked into the client bundle at build time
        PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
    container_name: kpos-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV:       ${NODE_ENV:-production}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost/api/v1}
      HOST:           0.0.0.0
      PORT:           3000
    depends_on:
      - api
    networks:
      - kpos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512m }

  # ═══════════════════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy  (profile: production)
  # Start with: docker compose --profile production up -d
  # Without the profile, traffic goes directly to api:5000 / frontend:3000
  # ═══════════════════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: kpos-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      # Substituted into docker/nginx/templates/*.template by nginx's
      # built-in envsubst-on-startup (>= nginx:1.19).
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env — see scripts/init-letsencrypt.sh}
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
      - letsencrypt_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - kpos-network
    profiles:
      - production
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  # ═══════════════════════════════════════════════════════════════════════════
  # Nginx — local HTTP-only reverse proxy (profile: local-nginx)
  # Start with: docker compose --profile local-nginx up -d
  # Same routing as the production nginx service (api/socket.io/health ->
  # api:5000, everything else -> frontend:3000) but no domain or TLS —
  # for testing the full stack behind a reverse proxy on a workstation/LAN
  # before a real domain + certbot (`--profile production`) is set up.
  # ═══════════════════════════════════════════════════════════════════════════
  nginx-local:
    image: nginx:alpine
    container_name: kpos-nginx-local
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "${NGINX_LOCAL_PORT:-80}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/templates-local:/etc/nginx/templates:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - kpos-network
    profiles:
      - local-nginx
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256m }

  # ═══════════════════════════════════════════════════════════════════════════
  # Certbot — Let's Encrypt renewal loop (profile: production)
  # First-time issuance is handled by scripts/init-letsencrypt.sh, run once by
  # the operator before starting this stack. This service only renews.
  # ═══════════════════════════════════════════════════════════════════════════
  certbot:
    image: certbot/certbot
    container_name: kpos-certbot
    restart: unless-stopped
    volumes:
      - letsencrypt_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done;'
    networks:
      - kpos-network
    profiles:
      - production
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  # ═══════════════════════════════════════════════════════════════════════════
  # Monitoring stack (profile: monitoring)
  # Start with: docker compose --profile monitoring up -d
  # Self-hosted, no external account needed. otel-collector bridges the API's
  # existing OTLP metrics export to Prometheus; promtail ships every
  # container's stdout/stderr (plain `docker logs`, no app code change) to
  # Loki; Grafana comes pre-provisioned with both as datasources.
  # ═══════════════════════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    container_name: kpos-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      # Exposed to the host, not just kpos-network, so a locally-running
      # (non-containerized) `npm run dev` API process can also point
      # OTEL_EXPORTER_OTLP_ENDPOINT at it — not just the dockerized `api`
      # service, which reaches it over kpos-network by container name.
      - "${OTEL_COLLECTOR_HTTP_PORT:-4318}:4318"
      - "${OTEL_COLLECTOR_GRPC_PORT:-4317}:4317"
    volumes:
      - ./monitoring/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    networks:
      - kpos-network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: kpos-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - kpos-network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  loki:
    image: grafana/loki:3.2.1
    container_name: kpos-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/local-config.yaml"]
    networks:
      - kpos-network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  promtail:
    image: grafana/promtail:3.2.1
    container_name: kpos-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      - loki
    networks:
      - kpos-network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  grafana:
    image: grafana/grafana:11.3.1
    container_name: kpos-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      # Change on first login — this is a dev-friendly default, not meant
      # for an internet-exposed deployment. Set GRAFANA_ADMIN_PASSWORD in
      # .env for anything beyond local/pilot use.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - kpos-network
    profiles:
      - monitoring
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  kpos-network:
    driver: bridge
    name: kpos-network

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  postgres_data:
    name: kpos-postgres-data
  redis_data:
    name: kpos-redis-data
  rabbitmq_data:
    name: kpos-rabbitmq-data
  letsencrypt_certs:
    name: kpos-letsencrypt-certs
  certbot_webroot:
    name: kpos-certbot-webroot
  prometheus_data:
    name: kpos-prometheus-data
  loki_data:
    name: kpos-loki-data
  grafana_data:
    name: kpos-grafana-data
