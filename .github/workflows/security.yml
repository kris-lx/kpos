name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api-typecheck-test:
    name: API typecheck + build + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: APIS
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: APIS/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm test -- --run

  web-build:
    name: Frontend typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kpos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: kpos/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          # Build-only value — $env/static/public just needs something
          # defined at build time, doesn't need to be reachable in CI.
          PUBLIC_API_URL: http://localhost:5000/api/v1

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kpos_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d kpos_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Migrations run DDL (CREATE ROLE kpos_app, ALTER TABLE ... ENABLE RLS)
      # as the Postgres superuser; the app itself connects as kpos_app (the
      # least-privilege role migration 0013 creates) once migrations have run.
      DATABASE_MIGRATE_URL: postgresql://postgres:postgres@localhost:5432/kpos_db
      DATABASE_URL: postgresql://kpos_app:kpos_app_secret_change_me@localhost:5432/kpos_db
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: e2e-ci-only-secret-not-used-anywhere-real-32
      CONFIG_ENCRYPTION_KEY: e2e-ci-only-secret-not-used-anywhere-32
      AUDIT_HMAC_SECRET: e2e-ci-only-secret-not-used-anywhere-32
      NODE_ENV: development
      PORT: 5000
      # seed-demo.ts's own defaults — set explicitly so the E2E login below
      # doesn't depend on the seed script's env-var fallback staying in sync.
      E2E_EMAIL: owner@kpos.la
      E2E_PASSWORD: Demo@123456
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - name: Install API deps
        working-directory: APIS
        run: npm ci
      - name: Install frontend deps
        working-directory: kpos
        run: npm ci
      - name: Install Playwright browsers
        working-directory: kpos
        run: npx playwright install --with-deps chromium

      - name: Run migrations
        working-directory: APIS
        run: npm run db:migrate
      - name: Seed demo data
        working-directory: APIS
        run: npm run db:seed:demo

      - name: Start API (background)
        working-directory: APIS
        run: npx tsx src/index.ts &
      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/health && exit 0
            sleep 2
          done
          echo "API did not become healthy in time" && exit 1

      - name: Run Playwright E2E suite
        working-directory: kpos
        env:
          PUBLIC_API_URL: http://localhost:5000/api/v1
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: kpos/playwright-report/
          retention-days: 14

  docker-build:
    name: Docker image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API production image
        run: docker build -f APIS/Dockerfile --target production ./APIS
      - name: Build frontend production image
        run: docker build -f kpos/Dockerfile --target production --build-arg PUBLIC_API_URL=http://localhost/api/v1 ./kpos
