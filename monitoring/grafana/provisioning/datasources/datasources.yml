apiVersion: 1

datasources:
  # Fixed `uid`s so the provisioned dashboard (kpos-overview.json) can
  # reference them by a stable string instead of Grafana's auto-generated
  # (non-deterministic) UID.
  - name: Prometheus
    uid: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Loki
    uid: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
