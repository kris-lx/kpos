# ═══════════════════════════════════════════════════════════════════════════
# OpenTelemetry Collector — bridges the API's existing OTLP export
# (instrumentation.ts, already vendor-agnostic, zero app code change needed)
# into Prometheus-scrapable metrics. Traces are logged for now (no trace
# backend — Tempo/Jaeger — is in scope for this pass); add a traces exporter
# here later without touching application code.
# ═══════════════════════════════════════════════════════════════════════════

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
  debug:
    verbosity: basic

processors:
  batch: {}

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
