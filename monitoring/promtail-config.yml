server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Discovers every container on the kpos-network via the Docker socket and
  # ships its stdout/stderr to Loki, labeled by container/service name — no
  # application code change needed, this is plain `docker logs` under the
  # hood. Every service's existing console.log/console.error output becomes
  # searchable in Grafana's Loki datasource.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
